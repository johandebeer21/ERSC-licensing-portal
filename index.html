<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/johandebeer21/ERSC-licensing-portal/main/ERSC%20Logo.jpg" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ERSC Training & Tactics | Firearm License Portal</title>

<style>
  :root {
    --primary: #111111;
    --accent: #c5a059; /* Elegant Gold accent */
    --text-dim: #a0a0a0;
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
    background-color: #050505; /* Deep black for premium feel */
    margin: 0; padding: 0;
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* --- ANIMATED BACKGROUND --- */
  #canvas-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
  }

  /* --- GLASS NAVIGATION --- */
  .top-nav {
    position: sticky; top: 0;
    background: rgba(5, 5, 5, 0.8);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--glass-border);
    padding: 1rem 0;
    z-index: 100;
    display: flex; justify-content: center;
  }
  .top-nav img { height: 60px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }

  /* --- CINEMATIC HERO --- */
  .hero {
    position: relative;
    height: 60vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(to bottom, rgba(5,5,5,0.2), #050505),
                url('https://raw.githubusercontent.com/johandebeer21/ERSC-licensing-portal/main/ersc_training_tactics_pty_ltd_cover.jpg') center/cover no-repeat fixed;
    text-align: center;
    padding: 0 20px;
  }

  .hero-content h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    text-transform: uppercase;
    letter-spacing: 8px;
    margin: 0;
    font-weight: 200;
  }

  .hero-content p {
    color: var(--text-dim);
    font-size: 1.1rem;
    letter-spacing: 2px;
    margin-top: 10px;
    text-transform: uppercase;
  }

  /* --- MAIN CONTENT --- */
  .portal-section {
    position: relative;
    z-index: 1;
    max-width: 500px;
    margin: -80px auto 60px auto; /* Overlaps hero for depth */
    padding: 40px 20px;
  }

  .button-stack {
    display: flex; flex-direction: column; gap: 1.2rem;
  }

  .btn {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: #fff;
    padding: 1.4rem;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 0.9rem;
    font-weight: 600;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    backdrop-filter: blur(5px);
  }

  .btn:hover {
    background: #ffffff;
    color: #000;
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .btn.active { border-left: 4px solid var(--accent); }

  .btn.disabled {
    opacity: 0.3;
    pointer-events: none;
    filter: grayscale(1);
  }

  .btn-ghost {
    background: transparent;
    margin-top: 2rem;
    border: 1px solid rgba(255,255,255,0.2);
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  /* --- THE "GREAT" FOOTER --- */
  .unified-footer {
    margin-top: auto;
    background: #0a0a0a;
    padding: 60px 20px;
    border-top: 1px solid var(--glass-border);
    text-align: center;
  }

  .partner-box {
    margin-bottom: 40px;
  }

  .partner-box span {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 4px;
    color: var(--text-dim);
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .dlam-logo {
    height: 45px;
    opacity: 0.6;
    transition: opacity 0.3s;
    filter: brightness(0) invert(1); /* Makes logo white to match theme */
  }

  .dlam-logo:hover { opacity: 1; }

  .copyright {
    font-size: 0.7rem;
    color: #444;
    letter-spacing: 1px;
  }

  @media (max-width: 600px) {
    .hero { height: 50vh; }
    .portal-section { margin-top: -40px; }
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<nav class="top-nav">
  <img src="https://raw.githubusercontent.com/johandebeer21/ERSC-licensing-portal/main/ERSC%20Logo.jpg" alt="ERSC Logo" />
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>Licensing Portal</h1>
    <p>Professional Compliance & Motivation</p>
  </div>
</section>

<main class="portal-section">
  <div class="button-stack">
    <a href="https://tally.so/r/gDNgD1" target="_blank" class="btn active">Section 13 Self-Defense</a>
    <a href="#" class="btn disabled">Section 15 Occasional</a>
    <a href="#" class="btn disabled">Section 16 Dedicated Sport</a>
    <a href="#" class="btn disabled">Section 16 Dedicated Hunting</a>
    
    <a href="https://trainingntactics.co.za/" target="_blank" class="btn btn-ghost">Official ERSC Training Website</a>
  </div>
</main>

<footer class="unified-footer">
  <div class="partner-box">
    <span>Strategic Partner</span>
    <img src="https://raw.githubusercontent.com/johandebeer21/ERSC-licensing-portal/main/New%20logo%20transparent.png" class="dlam-logo" alt="DLAM Logo" />
  </div>
  <div class="copyright">
    &copy; 2026 ERSC TRAINING & TACTICS | POWERED BY DIGITAL LICENSE ASSIST METHOD™
  </div>
</footer>

<script>
  // MODERN BACKGROUND PARTICLES
  const container = document.getElementById('canvas-container');
  const createParticle = () => {
    const p = document.createElement('div');
    const size = Math.random() * 2 + 1 + 'px';
    p.style.position = 'absolute';
    p.style.width = size;
    p.style.height = size;
    p.style.backgroundColor = 'rgba(255, 255, 255, 0.2)';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.borderRadius = '50%';
    p.style.opacity = Math.random();
    
    container.appendChild(p);
    
    const duration = Math.random() * 3000 + 2000;
    p.animate([
      { transform: 'translateY(0) scale(1)', opacity: 0 },
      { transform: 'translateY(-100px) scale(1.2)', opacity: 0.5 },
      { transform: 'translateY(-200px) scale(1)', opacity: 0 }
    ], { duration, iterations: Infinity });
  };

  for(let i=0; i<50; i++) createParticle();
</script>

</body>
</html>
